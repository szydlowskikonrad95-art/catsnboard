name: PHP lint

# Sprawdza składnię PHP obu wtyczek przy każdym push i pull requeście.
# Łapie literówki/błędy składni (fatal error) ZANIM trafią na main.
# Lekki: sam `php -l`, bez composera/bazy — sekundy.
# MATRIX (z recenzji 2026-07-14): 7.4 = strażnik minimalnej zgodności (Requires PHP wtyczek),
# 8.2–8.5 = fatalne/nowa składnia na wersjach, na których realnie chodzą dzisiejsze hostingi.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Strażnik sprzątania (dodany 2026-07-15 po 2. recenzji kolegi).
  # Pilnuje dwóch błędów, które recenzent znalazł CZYTANIEM KODU, a nasze testy przepuściły:
  #   1) uninstall.php nie kasował 6 opcji Gemini — KLUCZ API klienta zostawał w jego bazie,
  #   2) LIKE z gołym wzorcem mógł skasować transienty CUDZEJ wtyczki (`_` = wildcard w SQL).
  # Wcześniej bramką był komentarz w pliku („dopisz opcję tutaj") = ludzka pamięć. Zawiodła.
  # Sprawdzone kontrolą: podstawiony uninstall.php sprzed naprawy → ten job WYWALA się poprawnie.
  sprzatanie:
    runs-on: ubuntu-latest
    name: strażnik sprzątania (uninstall + SQL)
    steps:
      - uses: actions/checkout@v4
      - name: Uninstall zna każdą zapisywaną opcję + zero LIKE z gołym wzorcem
        run: bash testy/straznik-sprzatania.sh

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.2', '8.3', '8.4', '8.5']
    name: lint (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php }}'

      - name: Lint składni PHP (pnb-blocks + pnb-auto-pl + testy)
        run: |
          set -e
          BLAD=0
          for f in $(find pnb-blocks pnb-auto-pl testy -name '*.php'); do
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "❌ Błąd składni: $f"
              php -l "$f" || true
              BLAD=1
            fi
          done
          if [ "$BLAD" = "0" ]; then
            echo "✅ Wszystkie pliki PHP obu wtyczek: składnia OK"
          fi
          exit $BLAD
